<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
    }

    .cart-item {
      background: rgba(255,255,255,0.95);
      margin: 12px auto;
      padding: 12px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
    }

    .info {
      flex: 1;
      text-align: left;
      margin-left: 10px;
    }

    .controls {
      display: flex;
      align-items: center;
    }

    .controls button {
      padding: 6px 10px;
      margin: 2px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .controls button:hover {
      opacity: 0.8;
    }

    .qty {
      margin: 0 6px;
      font-weight: bold;
    }

    .remove {
      background: #e74c3c;
      color: white;
      margin-left: 5px;
    }

    .total-box {
      background: white;
      padding: 15px;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      margin: 20px auto;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .checkout-btn {
      width: 100%;
      max-width: 420px;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .checkout-btn:hover {
      background: #333;
    }

    .empty {
      color: white;
      margin-top: 40px;
      font-size: 18px;
    }

  </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div id="cartItems"></div>

<div id="totalBox" class="total-box"></div>

<button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Convert to quantity system
let cartMap = {};

cart.forEach(item => {
  if (cartMap[item.name]) {
    cartMap[item.name].qty += 1;
  } else {
    cartMap[item.name] = { ...item, qty: 1 };
  }
});

// RENDER CART
function renderCart() {

  let html = "";
  let total = 0;

  const items = Object.values(cartMap);

  if (items.length === 0) {
    document.getElementById("cartItems").innerHTML =
      "<p class='empty'>Your cart is empty 🛒</p>";
    document.getElementById("totalBox").innerText = "";
    return;
  }

  items.forEach(item => {

    total += item.qty * parseInt(item.price.replace("₹",""));

    html += `
      <div class="cart-item">
        <img src="${item.img}" loading="lazy">

        <div class="info">
          <div>${item.name}</div>
          <div>₹${item.price.replace("₹","")}</div>
        </div>

        <div class="controls">
          <button onclick="decrease('${item.name}')">−</button>
          <span class="qty">${item.qty}</span>
          <button onclick="increase('${item.name}')">+</button>
        </div>

        <button class="remove" onclick="removeItem('${item.name}')">❌</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("totalBox").innerText = "Total: ₹" + total;
}

// INCREASE
function increase(name) {
  cartMap[name].qty++;
  updateStorage();
}

// DECREASE
function decrease(name) {
  if (cartMap[name].qty > 1) {
    cartMap[name].qty--;
  } else {
    delete cartMap[name];
  }
  updateStorage();
}

// REMOVE
function removeItem(name) {
  delete cartMap[name];
  updateStorage();
}

// SYNC STORAGE
function updateStorage() {
  let newCart = [];

  Object.values(cartMap).forEach(item => {
    for (let i = 0; i < item.qty; i++) {
      newCart.push(item);
    }
  });

  localStorage.setItem("cart", JSON.stringify(newCart));
  renderCart();
}

// CHECKOUT
function checkout() {
  window.location.href = "payment.html";
}

// LOAD PAGE
renderCart();

</script>

</body>
</html>
