<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Convert cart into quantity system
let cartMap = {};

cart.forEach(item => {
  if (cartMap[item.name]) {
    cartMap[item.name].qty += 1;
  } else {
    cartMap[item.name] = { ...item, qty: 1 };
  }
});

// 🔥 Update cart count (single source of truth)
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = "Items: " + cart.length;
}

// 🔄 Render Cart
function renderCart() {

  let html = "";
  let total = 0;

  const items = Object.values(cartMap);

  if (items.length === 0) {
    document.getElementById("cartItems").innerHTML =
      "<p style='color:white'>Cart is empty 🛒</p>";

    document.getElementById("total").innerText = "Total: ₹0";

    updateCartCount(); // ✅ keep count visible
    return;
  }

  items.forEach(item => {

    total += item.qty * parseInt(item.price.replace("₹",""));

    html += `
      <div class="cart-item">
        <img src="${item.img}">
        <div>
          <div>${item.name}</div>
          <div>₹${item.price.replace("₹","")}</div>
        </div>

        <div class="controls">
          <button onclick="decrease('${item.name}')">−</button>
          <span class="qty">${item.qty}</span>
          <button onclick="increase('${item.name}')">+</button>
        </div>

        <button class="remove" onclick="removeItem('${item.name}')">❌</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;

  updateCartCount(); // ✅ only here
}

// ➕ Increase
function increase(name) {
  cartMap[name].qty++;
  updateStorage();
}

// ➖ Decrease
function decrease(name) {
  if (cartMap[name].qty > 1) {
    cartMap[name].qty--;
  } else {
    delete cartMap[name];
  }
  updateStorage();
}

// ❌ Remove
function removeItem(name) {
  delete cartMap[name];
  updateStorage();
}

// 🔄 Sync with storage
function updateStorage() {
  let newCart = [];

  Object.values(cartMap).forEach(item => {
    for (let i = 0; i < item.qty; i++) {
      newCart.push(item);
    }
  });

  localStorage.setItem("cart", JSON.stringify(newCart));

  renderCart(); // ✅ this will update count too
}

// 🗑️ Clear Cart
function clearCart() {
  if (confirm("Clear entire cart?")) {
    localStorage.removeItem("cart");
    cartMap = {};
    renderCart();
  }
}

// 💳 Checkout
function checkout() {
  window.location.href = "payment.html";
}

// INITIAL LOAD
renderCart();

</script>
