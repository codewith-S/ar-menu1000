<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>

  <style>
    body {
      font-family: Arial;
      background: #2ecc71;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: white;
    }

    .cart-item {
      background: white;
      margin: 10px auto;
      padding: 10px;
      border-radius: 10px;
      width: 300px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
    }

    .controls button {
      padding: 5px 10px;
      margin: 2px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .remove {
      background: red;
      color: white;
    }

    .qty {
      font-weight: bold;
    }

    .checkout-btn {
      margin-top: 10px;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }

    .clear-btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #e74c3c;
      color: white;
      cursor: pointer;
    }

    .cart-count {
      color: white;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<h3 class="cart-count" id="cartCount"></h3>

<div id="cartItems"></div>

<h2 id="total"></h2>

<button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>

<button class="clear-btn" id="clearBtn" onclick="clearCart()">🗑️ Clear Cart</button>

<script>

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// MAP
let cartMap = {};

cart.forEach(item => {
  if (cartMap[item.name]) {
    cartMap[item.name].qty += 1;
  } else {
    cartMap[item.name] = { ...item, qty: 1 };
  }
});

// 🔥 COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = "Items: " + cart.length;
}

// 🔥 SHOW/HIDE CLEAR BUTTON
function toggleClearButton(isEmpty) {
  document.getElementById("clearBtn").style.display = isEmpty ? "none" : "inline-block";
}

// 🔄 RENDER
function renderCart() {

  let html = "";
  let total = 0;

  const items = Object.values(cartMap);

  if (items.length === 0) {
    document.getElementById("cartItems").innerHTML =
      "<p style='color:white'>Cart is empty 🛒</p>";

    document.getElementById("total").innerText = "Total: ₹0";

    updateCartCount();
    toggleClearButton(true); // 🔥 hide button

    return;
  }

  items.forEach(item => {

    total += item.qty * parseInt(item.price.replace("₹",""));

    html += `
      <div class="cart-item">
        <img src="${item.img}">
        <div>
          <div>${item.name}</div>
          <div>₹${item.price.replace("₹","")}</div>
        </div>

        <div class="controls">
          <button onclick="decrease('${item.name}')">−</button>
          <span class="qty">${item.qty}</span>
          <button onclick="increase('${item.name}')">+</button>
        </div>

        <button class="remove" onclick="removeItem('${item.name}')">❌</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;

  updateCartCount();
  toggleClearButton(false); // 🔥 show button
}

// ➕
function increase(name) {
  cartMap[name].qty++;
  updateStorage();
}

// ➖
function decrease(name) {
  if (cartMap[name].qty > 1) {
    cartMap[name].qty--;
  } else {
    delete cartMap[name];
  }
  updateStorage();
}

// ❌
function removeItem(name) {
  delete cartMap[name];
  updateStorage();
}

// 🔄 STORAGE
function updateStorage() {
  let newCart = [];

  Object.values(cartMap).forEach(item => {
    for (let i = 0; i < item.qty; i++) {
      newCart.push(item);
    }
  });

  localStorage.setItem("cart", JSON.stringify(newCart));
  renderCart();
}

// 🗑️ CLEAR
function clearCart() {
  if (confirm("Clear entire cart?")) {
    localStorage.removeItem("cart");
    cartMap = {};
    renderCart();
  }
}

// 💳
function checkout() {
  window.location.href = "payment.html";
}

// INIT
renderCart();

</script>

</body>
</html>
