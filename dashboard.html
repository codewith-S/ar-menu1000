<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      margin: 0;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 🔥 TOP WHITE GLOW */
    body::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      top: -80px;
      left: -80px;
      filter: blur(50px);
    }

    /* 🔥 BOTTOM WHITE GLOW */
    body::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      bottom: -80px;
      right: -80px;
      filter: blur(50px);
    }

    /* 🔥 ENSURE CONTENT ABOVE GLOW */
    h1, .grid, .list-card, .clear-btn {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 20px;
    }

    .clear-btn {
      background: #e74c3c;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: block;
      margin: 0 auto 20px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #555;
    }

    .card p {
      font-size: 22px;
      font-weight: bold;
      color: #27ae60;
    }

    .list-card {
      margin-top: 20px;
      background: white;
      border-radius: 20px;
      padding: 15px;
      position: relative;
      z-index: 1;
    }

    .list-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .list-item img {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      margin-right: 10px;
    }

    .empty {
      text-align: center;
      color: #777;
    }
  </style>
</head>

<body>

<h1>📊 Dashboard</h1>

<button onclick="clearOrders()" class="clear-btn">
  🗑️ Clear Orders
</button>

<div class="grid">

  <div class="card">
    <h3>Total Orders</h3>
    <p id="orders">0</p>
  </div>

  <div class="card">
    <h3>Total Revenue</h3>
    <p id="revenue">₹0</p>
  </div>

  <div class="card">
    <h3>Peak Hour</h3>
    <p id="peak">--</p>
  </div>

  <div class="card">
    <h3>Top Item</h3>
    <p id="top">None</p>
  </div>

</div>

<div class="list-card">
  <h3>Orders List</h3>
  <div id="list"></div>
</div>

<script>

// AUTH CHECK
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}

// CLEAR ORDERS
function clearOrders() {
  let confirmClear = confirm("Delete all orders?");
  if (confirmClear) {
    localStorage.removeItem("orders");
    alert("All orders cleared!");
    location.reload();
  }
}

// GET ORDERS
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let totalRevenue = 0;
let itemCount = {};
let hourCount = {};
let html = "";

orders.forEach(o => {
  totalRevenue += o.price;

  itemCount[o.name] = (itemCount[o.name] || 0) + 1;

  let hour = new Date(o.time || Date.now()).getHours();
  hourCount[hour] = (hourCount[hour] || 0) + 1;

  html += `
    <div class="list-item">
      <img src="${o.img}">
      <div>${o.name} - ₹${o.price}</div>
    </div>
  `;
});

// UPDATE UI
document.getElementById("orders").innerText = orders.length;
document.getElementById("revenue").innerText = "₹" + totalRevenue;

let topItem = orders.length
  ? Object.keys(itemCount).reduce((a, b) => itemCount[a] > itemCount[b] ? a : b)
  : "None";

document.getElementById("top").innerText = topItem;

let peakHour = orders.length
  ? Object.keys(hourCount).reduce((a, b) => hourCount[a] > hourCount[b] ? a : b)
  : "--";

document.getElementById("peak").innerText = peakHour + ":00";

if (orders.length === 0) {
  document.getElementById("list").innerHTML =
    "<p class='empty'>No orders yet</p>";
} else {
  document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
