<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      position: relative;
      overflow: hidden;
    }

    /* 🔥 Background glow */
    body::before {
      content: "";
      position: absolute;
      width: 350px;
      height: 350px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      top: -100px;
      left: -100px;
      filter: blur(60px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      bottom: -100px;
      right: -100px;
      filter: blur(60px);
    }

    /* 🍋 LEMONS */
    .lemon {
      position: absolute;
      width: 260px; /* 🔥 bigger */
      opacity: 0.28;
      z-index: 0;
      pointer-events: none;
      filter: blur(2px);
      animation: float 7s ease-in-out infinite;
    }

    .lemon-top {
      top: 18%;
      left: 10%;
    }

    .lemon-bottom {
      bottom: 18%;
      right: 10%;
      transform: rotate(180deg);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

   .container {
  width: 95%;
  max-width: 800px;
  margin: auto;           /* ✅ ensures horizontal centering */
  display: flex;          /* ✅ NEW */
  justify-content: center;/* ✅ CENTER CARD */
}

    /* 🧊 CARD */
    .menu-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 30px; /* 🔥 increased */
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
      transition: 0.3s;
    }

    .menu-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 30px 70px rgba(0,0,0,0.3);
    }

    /* 🍰 IMAGE */
    .food-img {
      width: 100%;
      height: 260px; /* 🔥 increased */
      object-fit: cover;
      border-radius: 22px;
    }

    /* 📝 TEXT */
    h2 {
      margin: 15px 0;
      font-size: 26px;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      color: #27ae60;
    }

    /* 🔘 BUTTONS */
    button {
      width: 100%;
      margin-top: 12px;
      padding: 16px; /* 🔥 bigger */
      border: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 17px;
      cursor: pointer;
      transition: 0.3s;
    }

    .primary {
      background: #27ae60;
      color: white;
    }

    .primary:hover {
      background: #219150;
    }

    .secondary {
      background: #ecf0f1;
    }

    .secondary:hover {
      background: #dfe6e9;
    }

    .nav {
      display: flex;
      gap: 14px; /* 🔥 bigger spacing */
    }

    .cart-btn {
      background: black;
      color: white;
    }

    .cart-btn:hover {
      background: #333;
    }

  </style>
</head>

<body>

<!-- 🍋 BACKGROUND -->
<img src="lemon.png" class="lemon lemon-top">
<img src="lemon.png" class="lemon lemon-bottom">

<div class="container">

  <div class="menu-card">

    <img id="image" class="food-img">

    <h2 id="name"></h2>
    <p class="price" id="price"></p>

    <button class="primary" onclick="viewAR()">View in AR</button>
    <button class="secondary" onclick="addToCart()">Add to Cart</button>

    <div class="nav">
      <button class="secondary" onclick="prevItem()">⬅️</button>
      <button class="secondary" onclick="nextItem()">➡️</button>
    </div>

    <button class="cart-btn" onclick="goToCart()">🛒 View Cart</button>

  </div>

</div>

<script>

const menu = [
  { name: "Cake", price: "₹200", model: "cake.glb", img: "cake.jpg", scale: "0.08 0.08 0.08", rotation: "0 0 0" },
  { name: "Vada Pav", price: "₹50", model: "vada.glb", img: "vada.jpg", scale: "1 1 1", rotation: "0 0 0" },
  { name: "Burger", price: "₹120", model: "food.glb", img: "burger.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" },
  { name: "Coffee", price: "₹80", model: "coffee.glb", img: "coffee.jpg", scale: "5 5 5", rotation: "0 0 0" },
  { name: "Ice Cream", price: "₹100", model: "icecream.glb", img: "icecream.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" }
];

let index = 0;

function updateMenu() {
  document.getElementById("name").innerText = menu[index].name;
  document.getElementById("price").innerText = menu[index].price;
  document.getElementById("image").src = menu[index].img;
}

function nextItem() {
  index = (index + 1) % menu.length;
  updateMenu();
}

function prevItem() {
  index = (index - 1 + menu.length) % menu.length;
  updateMenu();
}

function viewAR() {
  const item = menu[index];
  window.location.href =
    "ar.html?model=" + item.model +
    "&name=" + item.name +
    "&scale=" + item.scale +
    "&rotation=" + item.rotation;
}

function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(menu[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(menu[index].name + " added!");
}

function goToCart() {
  window.location.href = "cart.html";
}

updateMenu();

</script>

</body>
</html>
