<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      position: relative;
      overflow: hidden;
    }

    /* 🔥 Background glow */
    body::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      top: -80px;
      left: -80px;
      filter: blur(50px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 250px;
      height: 250px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      bottom: -80px;
      right: -80px;
      filter: blur(50px);
    }

    /* 🍋 LEMONS BEHIND CARD */
    

/* 🍋 RESPONSIVE LEMONS */
.lemon {
  position: absolute;
  width: 220px;
  opacity: 0.28;
  z-index: 0;
  pointer-events: none;
  filter: blur(2px);
  animation: float 7s ease-in-out infinite;
}

/* 💻 DESKTOP */
.lemon-top {
  top: 15%;
  left: 35%;
  transform: translate(-50%, -50%);
}

.lemon-bottom {
  bottom: 15%;
  right: 35%;
  transform: translate(50%, 50%) rotate(180deg);
}

@media (max-width: 600px) {

  .lemon {
    width: 170px;
    opacity: 0.3;
  }

  /* 🔥 FIXED: top-left near card */
  .lemon-top {
    top: 10%;
    left: 50%;
    transform: translate(240%, 230%);
  }

  /* 🔥 FIXED: bottom-right near card */
  .lemon-bottom {
    top: 150%;
    left: 150%;
    transform: translate(85%, 110%) rotate(180deg);
  }
}
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0px); }
    }

.container {
  width: 90%;
  max-width: 350px;
  z-index: 1;
  position: relative; /* 🔥 IMPORTANT */
}
    .menu-card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      transition: 0.3s;
    }

    .menu-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .food-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 20px;
    }

    h2 {
      margin: 10px 0;
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      color: #27ae60;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .primary {
      background: #27ae60;
      color: white;
    }

    .primary:hover {
      background: #219150;
    }

    .secondary {
      background: #ecf0f1;
    }

    .secondary:hover {
      background: #dfe6e9;
    }

    .nav {
      display: flex;
      gap: 10px;
    }

    .cart-btn {
      background: black;
      color: white;
    }

    .cart-btn:hover {
      background: #333;
    }

  </style>
</head>

<body>

<!-- 🍋 BEHIND CARD -->
<img src="lemon.png" class="lemon lemon-top">
<img src="lemon.png" class="lemon lemon-bottom">

<div class="container">

  <div class="menu-card">

    <img id="image" class="food-img">

    <h2 id="name"></h2>
    <p class="price" id="price"></p>

    <button class="primary" onclick="viewAR()">View in AR</button>
    <button class="secondary" onclick="addToCart()">Add to Cart</button>

    <div class="nav">
      <button class="secondary" onclick="prevItem()">⬅️</button>
      <button class="secondary" onclick="nextItem()">➡️</button>
    </div>

    <button class="cart-btn" onclick="goToCart()">🛒 View Cart</button>

  </div>

</div>

<script>

const menu = [
  { name: "Cake", price: "₹200", model: "cake.glb", img: "cake.jpg", scale: "0.08 0.08 0.08", rotation: "0 0 0" },
  { name: "Vada Pav", price: "₹50", model: "vada.glb", img: "vada.jpg", scale: "1 1 1", rotation: "0 0 0" },
  { name: "Burger", price: "₹120", model: "food.glb", img: "burger.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" },
  { name: "Coffee", price: "₹80", model: "coffee.glb", img: "coffee.jpg", scale: "5 5 5", rotation: "0 0 0" },
  { name: "Ice Cream", price: "₹100", model: "icecream.glb", img: "icecream.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" }
];

let index = 0;

function updateMenu() {
  document.getElementById("name").innerText = menu[index].name;
  document.getElementById("price").innerText = menu[index].price;
  document.getElementById("image").src = menu[index].img;
}

function nextItem() {
  index = (index + 1) % menu.length;
  updateMenu();
}

function prevItem() {
  index = (index - 1 + menu.length) % menu.length;
  updateMenu();
}

function viewAR() {
  const item = menu[index];
  window.location.href =
    "ar.html?model=" + item.model +
    "&name=" + item.name +
    "&scale=" + item.scale +
    "&rotation=" + item.rotation;
}

function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(menu[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(menu[index].name + " added!");
}

function goToCart() {
  window.location.href = "cart.html";
}

updateMenu();

</script>

</body>
</html>
