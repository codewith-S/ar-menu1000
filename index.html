<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #2ecc71; /* Green background */
      font-family: Arial;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .menu-card {
      background: rgba(255, 255, 255, 0.2);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 
        8px 8px 15px rgba(0,0,0,0.2),
        -8px -8px 15px rgba(255,255,255,0.2);
    }

    h1 {
      color: white;
    }

    h2, p {
      color: white;
    }

    button {
      margin: 10px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 15px;
      cursor: pointer;

      /* Claymorphism */
      background: #ffffff;
      box-shadow: 
        5px 5px 10px #bfbfbf,
        -5px -5px 10px #ffffff;
    }

    button:active {
      box-shadow: inset 5px 5px 10px #bfbfbf,
                  inset -5px -5px 10px #ffffff;
    }
  </style>
</head>

<body>

<div class="container">

<h1>🍽️ AR Menu</h1>

<div class="menu-card">
  <h2 id="name"></h2>
  <p id="price"></p>

  <button onclick="prevItem()">⬅️</button>
  <button onclick="nextItem()">➡️</button>

  <br>

  <button onclick="viewAR()">View in AR</button>
</div>

</div>

<script>

const menu = [
  { name: "Cake", price: "₹200", model: "cake.glb", scale: "0.5 0.5 0.5" },
  { name: "Vada Pav", price: "₹50", model: "vada.glb", scale: "1 1 1" },
  { name: "Burger", price: "₹120", model: "food.glb", scale: "1 1 1" },
  { name: "Coffee", price: "₹80", model: "coffee.glb", scale: "0.8 0.8 0.8" },
  { name: "Ice Cream", price: "₹100", model: "icecream.glb", scale: "0.4 0.4 0.4" }
];

let index = 0;

function updateMenu() {
  document.getElementById("name").innerText = menu[index].name;
  document.getElementById("price").innerText = menu[index].price;
}

function nextItem() {
  index = (index + 1) % menu.length;
  updateMenu();
}

function prevItem() {
  index = (index - 1 + menu.length) % menu.length;
  updateMenu();
}

function viewAR() {
  const item = menu[index];
  window.location.href = 
    "ar.html?model=" + item.model + 
    "&name=" + item.name + 
    "&scale=" + item.scale;
}

updateMenu();

</script>

</body>
</html>
