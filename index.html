<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      overflow: hidden;
    }

     /* 🍋 LEMONS (BEHIND CARD) */
    .lemon {
      position: absolute;
      width: 180px;
      opacity: 0.25;
      filter: blur(1.5px);
      z-index: 0; /* 🔥 behind */
      animation: float 6s ease-in-out infinite;
    }

    .lemon-top {
      top: 18%;
      left: 8%;
    }

    .lemon-bottom {
      bottom: 18%;
      right: 8%;
      transform: rotate(180deg);
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* 📱 CONTAINER */
   .container {
  width: 100%;
  max-width: 560px; /* 🔥 increased again */
  padding: 10px;
}
    /* 📱 CARD */
    .menu-card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 26px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    .food-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 20px;
    }

    h2 {
      margin: 10px 0;
      font-size: 26px;
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      color: #27ae60;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #27ae60;
      color: white;
    }

    .secondary {
      background: #ecf0f1;
    }

    .nav {
      display: flex;
      gap: 12px;
    }

    .cart-btn {
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<!-- 🍋 BACKGROUND -->
<img src="lemon.png" class="lemon lemon-top">
<img src="lemon.png" class="lemon lemon-bottom">

<div class="container">

  <div class="menu-card">

    <img id="image" class="food-img">

    <h2 id="name"></h2>
    <p class="price" id="price"></p>

    <button class="primary" onclick="viewAR()">View in AR</button>
    <button class="secondary" onclick="addToCart()">Add to Cart</button>

    <div class="nav">
      <button class="secondary" onclick="prevItem()">⬅️</button>
      <button class="secondary" onclick="nextItem()">➡️</button>
    </div>

    <button class="cart-btn" onclick="goToCart()">
      🛒 Cart <span id="cartCount">(0)</span>
    </button>

  </div>

</div>

<script>

const menu = [
  { name: "Cake", price: "₹200", model: "cake.glb", img: "cake.jpg", scale: "0.08 0.08 0.08", rotation: "0 0 0" },
  { name: "Vada Pav", price: "₹50", model: "vada.glb", img: "vada.jpg", scale: "1 1 1", rotation: "0 0 0" },
  { name: "Burger", price: "₹120", model: "food.glb", img: "burger.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" },
  { name: "Coffee", price: "₹80", model: "coffee.glb", img: "coffee.jpg", scale: "5 5 5", rotation: "0 0 0" },
  { name: "Ice Cream", price: "₹100", model: "icecream.glb", img: "icecream.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" }
];

let index = 0;

function updateMenu() {
  document.getElementById("name").innerText = menu[index].name;
  document.getElementById("price").innerText = menu[index].price;
  document.getElementById("image").src = menu[index].img;
}

function nextItem() {
  index = (index + 1) % menu.length;
  updateMenu();
}

function prevItem() {
  index = (index - 1 + menu.length) % menu.length;
  updateMenu();
}

function viewAR() {
  const item = menu[index];
  window.location.href =
    "ar.html?model=" + item.model +
    "&name=" + item.name +
    "&scale=" + item.scale +
    "&rotation=" + item.rotation;
}

function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(menu[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert(menu[index].name + " added!");
}

function goToCart() {
  window.location.href = "cart.html";
}

function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cartCount").innerText = "(" + cart.length + ")";
}

updateMenu();
updateCartCount();

</script>

</body>
</html>
