<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>

  <style>
  body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;

  /* Gradient background */
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  overflow: hidden;
}

/* 🔥 Leaf background effect */
body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  top: -80px;
  left: -80px;
  filter: blur(40px);
}

body::after {
  content: "";
  position: absolute;
  width: 250px;
  height: 250px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
  bottom: -60px;
  right: -60px;
  filter: blur(40px);
}

/* Container */
.container {
  width: 90%;
  max-width: 350px;
  z-index: 1;
}

/* Glass card */
.menu-card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

/* Image */
img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 20px;
}

/* Text */
h2 {
  margin: 10px 0;
}

.price {
  color: #27ae60;
  font-weight: bold;
  font-size: 20px;
}

/* Buttons */
button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

/* Primary */
.primary {
  background: #27ae60;
  color: white;
}

/* Secondary */
.secondary {
  background: #ecf0f1;
}

/* Floating cart */
.cart-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  color: white;
  border-radius: 50%;
  padding: 15px;
  font-size: 18px;
  
    }

    .nav-btn {
      font-size: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>🍽️ AR Menu</h1>

<div class="menu-card">

  <img id="image">

  <h2 id="name"></h2>
  <p id="price"></p>

  <!-- NAV BUTTONS -->
  <button class="nav-btn" onclick="prevItem()">⬅️</button>
  <button class="nav-btn" onclick="nextItem()">➡️</button>

  <br>

  <button onclick="viewAR()">View in AR</button>
  <button onclick="addToCart()">Add to Cart</button>

  <br>

  <button onclick="goToCart()">🛒 View Cart</button>

</div>

</div>

<script>

const menu = [
  { name: "Cake", price: "₹200", model: "cake.glb", img: "cake.jpg", scale: "0.08 0.08 0.08", rotation: "0 0 0" },

  { name: "Vada Pav", price: "₹50", model: "vada.glb", img: "vada.jpg", scale: "1 1 1", rotation: "0 0 0" },

  { name: "Burger", price: "₹120", model: "food.glb", img: "burger.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" },

  { name: "Coffee", price: "₹80", model: "coffee.glb", img: "coffee.jpg", scale: "5 5 5", rotation: "0 0 0" },

  { name: "Ice Cream", price: "₹100", model: "icecream.glb", img: "icecream.jpg", scale: "0.07 0.07 0.07", rotation: "0 0 0" }
];

let index = 0;

function updateMenu() {
  document.getElementById("name").innerText = menu[index].name;
  document.getElementById("price").innerText = menu[index].price;
  document.getElementById("image").src = menu[index].img;
}

// BUTTON NAVIGATION
function nextItem() {
  index = (index + 1) % menu.length;
  updateMenu();
}

function prevItem() {
  index = (index - 1 + menu.length) % menu.length;
  updateMenu();
}

// AR
function viewAR() {
  const item = menu[index];
  window.location.href =
    "ar.html?model=" + item.model +
    "&name=" + item.name +
    "&scale=" + item.scale +
    "&rotation=" + item.rotation;
}

// CART
function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(menu[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(menu[index].name + " added!");
}

function goToCart() {
  window.location.href = "cart.html";
}

// INITIAL LOAD
updateMenu();

</script>

</body>
</html>
