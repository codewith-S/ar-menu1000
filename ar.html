<!DOCTYPE html>
<html>
<head>
  <title>AR View</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

  <a-marker preset="hiro">
    <a-entity id="model" position="0 0.5 0"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<!-- ORDER BUTTON -->
<button onclick="placeOrder()" 
style="
  position:absolute;
  bottom:20px;
  left:20px;
  padding:15px;
  background:white;
  border-radius:15px;
  box-shadow: 5px 5px 10px #bfbfbf,
              -5px -5px 10px #ffffff;
">
  Order Now
</button>

<script>

// GET PARAMETERS
const params = new URLSearchParams(window.location.search);

const model = params.get("model");
const name = params.get("name");
const scale = params.get("scale");
const rotation = params.get("rotation");

// LOAD MODEL
const el = document.getElementById("model");

el.setAttribute("gltf-model", model);
el.setAttribute("scale", scale || "1 1 1");
el.setAttribute("rotation", rotation || "0 0 0");

// FIX POSITION
el.addEventListener("model-loaded", () => {
  el.object3D.position.set(0, 0.5, 0);
});


// ✅ UPDATED ORDER FUNCTION (NO DATABASE SAVE HERE)
function placeOrder() {
  alert(name + " added! Proceed to cart.");

  // Redirect to cart instead of saving order
  window.location.href = "cart.html";
}

</script>

</body>
</html>
