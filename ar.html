<!DOCTYPE html>
<html>
<head>
  <title>AR View</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- ONLY Burger Model -->
    <a-entity 
      gltf-model="food.glb"
      scale="5 5 5"
      position="0 0.5 0"
      rotation="0 180 0">
    </a-entity>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

<!-- ORDER BUTTON -->
<button onclick="placeOrder()" 
style="
  position: absolute;
  bottom: 20px;
  left: 20px;
  padding: 15px;
  font-size: 18px;
  background-color: green;
  color: white;
  border: none;
  border-radius: 10px;
">
  Order Now
</button>

<script>
function placeOrder() {
  alert("Order placed for Burger!");
}
</script>

</body>
</html>
