<!DOCTYPE html>
<html>
<head>
  <title>AR View</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>

  <!-- Marker -->
  <a-marker preset="hiro">

    <!-- 3D MODEL -->
    <a-entity id="model" position="0 0.5 0"></a-entity>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

<!-- ORDER BUTTON -->
<button onclick="placeOrder()" 
style="
  position:absolute;
  bottom:20px;
  left:20px;
  padding:15px;
  font-size:18px;
  background:white;
  border:none;
  border-radius:15px;
  box-shadow: 5px 5px 10px #bfbfbf,
              -5px -5px 10px #ffffff;
">
  Order Now
</button>

<script>

// GET PARAMETERS
const params = new URLSearchParams(window.location.search);

const model = params.get("model");
const name = params.get("name");
const scale = params.get("scale");
const rotation = params.get("rotation");

// TARGET ELEMENT
const el = document.getElementById("model");

// APPLY MODEL
el.setAttribute("gltf-model", model);

// APPLY SCALE
el.setAttribute("scale", scale || "1 1 1");

// APPLY ROTATION (DEFAULT CLEAN)
el.setAttribute("rotation", rotation || "0 0 0");

// FIX POSITION AFTER LOAD
el.addEventListener("model-loaded", () => {
  el.object3D.position.set(0, 0.5, 0);
});


// ORDER FUNCTION (CONNECTED TO DASHBOARD)

function placeOrder() {

  let orders = JSON.parse(localStorage.getItem("orders")) || [];

  const priceMap = {
    "Cake": 200,
    "Vada Pav": 50,
    "Burger": 120,
    "Coffee": 80,
    "Ice Cream": 100
  };

  orders.push({
    name: name,
    price: priceMap[name],
    time: new Date(),
    img: name.toLowerCase().replace(" ", "") + ".jpg"
  });

  localStorage.setItem("orders", JSON.stringify(orders));

  alert("Order placed for " + name);
}

</script>

</body>
</html>
