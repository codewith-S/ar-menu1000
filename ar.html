<!DOCTYPE html>
<html lang="en">
<head>
  <title>AR View</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    .viewer {
      width: 90%;
      max-width: 420px;
      height: 420px;
      border-radius: 20px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: white;
    }

    .btn {
      margin-top: 15px;
      padding: 15px;
      width: 90%;
      max-width: 420px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .ar-btn {
      background: white;
      color: #27ae60;
    }

    .order-btn {
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<h2 id="title">Loading...</h2>

<div class="viewer">
  <model-viewer
    id="viewer"
    src=""
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
  >
  </model-viewer>
</div>

<button class="btn ar-btn" onclick="openAR()">
  🚀 View in AR
</button>

<button class="btn order-btn" onclick="placeOrder()">
  🛒 Order Now
</button>

<script>

// GET DATA
const params = new URLSearchParams(window.location.search);
const model = params.get("model");
const name = params.get("name");

// SET TITLE
document.getElementById("title").innerText = name || "Item";

// SET MODEL
const viewer = document.getElementById("viewer");
viewer.src = model;

// OPEN AR
function openAR() {
  viewer.activateAR(); // 🔥 auto chooses best AR
}

// ORDER
function placeOrder() {
  alert(name + " added! Proceed to cart.");
  window.location.href = "cart.html";
}

</script>

</body>
</html>
