<!DOCTYPE html>
<html>
<head>
  <title>AR View</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    .btn {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .ar-btn {
      background: white;
      color: #27ae60;
    }

    .order-btn {
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<div class="container">

  <h2 id="title">Loading...</h2>
  <p>Tap below to view in AR</p>

  <button class="btn ar-btn" onclick="launchAR()">
    🚀 View in AR
  </button>

  <button class="btn order-btn" onclick="placeOrder()">
    🛒 Order Now
  </button>

</div>

<script>

// GET PARAMETERS
const params = new URLSearchParams(window.location.search);

const model = params.get("model");
const name = params.get("name");

document.getElementById("title").innerText = name || "Item";

// 🚀 MARKERLESS AR FUNCTION
function launchAR() {

  const modelUrl = window.location.origin + "/" + model;

  const isAndroid = /Android/i.test(navigator.userAgent);
  const isiOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isAndroid) {

    // 🔥 Google Scene Viewer
    const url = `https://arvr.google.com/scene-viewer/1.0?file=${modelUrl}&mode=ar_only&resizable=true`;

    window.location.href = url;

  } else if (isiOS) {

    // 🍎 iPhone (needs USDZ)
    alert("iPhone requires USDZ model");

  } else {
    alert("AR not supported on this device");
  }
}

// 🛒 ORDER
function placeOrder() {
  alert(name + " added! Proceed to cart.");
  window.location.href = "cart.html";
}

</script>

</body>
</html>
