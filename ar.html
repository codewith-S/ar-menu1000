<!DOCTYPE html>
<html lang="en">
<head>
  <title>WebXR AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    #overlay {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 2;
      font-size: 16px;
    }

    #error {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: red;
      z-index: 2;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="overlay">📱 Move phone to detect surface</div>
<div id="error"></div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
import { ARButton } from 'https://unpkg.com/three@0.152.2/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

const params = new URLSearchParams(window.location.search);
const modelUrl = params.get("model");

let camera, scene, renderer;
let controller;

init();
animate();

function launchAR() {

  const modelUrl = model;

  const isAndroid = /Android/i.test(navigator.userAgent);

  // 🔥 Check WebXR support
  if (navigator.xr) {

    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {

      if (supported) {
        // ✅ Use WebXR
        window.location.href = "webxr.html?model=" + modelUrl;
      } else {
        fallbackAR();
      }

    });

  } else {
    fallbackAR();
  }

  function fallbackAR() {

    if (isAndroid) {

      // 🔥 Scene Viewer fallback
      const url =
        "https://arvr.google.com/scene-viewer/1.0?file=" +
        encodeURIComponent(modelUrl) +
        "&mode=ar_only&resizable=true";

      window.location.href = url;

    } else {
      alert("AR not supported on this device");
    }

  }

}
  // Resize fix
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

}

function animate() {
  renderer.setAnimationLoop(render);
}

function render() {
  renderer.render(scene, camera);
}

</script>

</body>
</html>
