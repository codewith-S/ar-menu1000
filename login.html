<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>

<body style="background:#2ecc71; text-align:center; font-family:Arial;">

<h1 style="color:white;">Owner Login</h1>

<input type="password" id="pass" placeholder="Enter Password"><br><br>
<button onclick="login()">Login</button>

<script>
const PASSWORD = "1234";

function login() {
  const val = document.getElementById("pass").value;

  if (val === PASSWORD) {
    localStorage.setItem("auth", "true");
    window.location.href = "owner.html"; // 🔥 important
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
